name: Deploy Frontend to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: task-managamnet-rg
  ACR_NAME: taskmanagamnetacr
  FRONTEND_APP: task-managamnet-frontend
  DEFAULT_DOMAIN: ambitiousmushroom-6a766356.centralus.azurecontainerapps.io

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/frontend:${{ github.sha }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/frontend:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/frontend:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/frontend:latest

      - name: Update Frontend Container App
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/frontend:${{ github.sha }} \
            --target-port 3000

      - name: Deployment Summary
        run: |
          echo "✅ Frontend deployment complete!"
          echo "Frontend URL: https://${{ env.FRONTEND_APP }}.${{ env.DEFAULT_DOMAIN }}"
          echo "Resource Group: ${{ env.RESOURCE_GROUP }}"
